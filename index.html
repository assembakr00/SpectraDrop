<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantone Color Palette Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://chir.ag/projects/ntc/ntc.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-900 text-white min-h-screen overflow-x-hidden">
    <!-- Container -->
    <div class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 px-4 py-12">
        <div class="max-w-6xl mx-auto">
            <!-- Header -->
            <div class="mb-12 animate-slideUp">
                <h1 class="text-5xl font-bold mb-3 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-400">
                    Color Palette Generator
                </h1>
                <p class="text-gray-400 text-lg">Upload an image to extract a stunning Pantone-style color palette</p>
            </div>

            <!-- Drag & Drop Zone -->
            <div class="mb-12 animate-slideUp" style="animation-delay: 0.1s;">
                <div id="dropzone" class="dropzone border-2 border-dashed border-gray-600 rounded-lg p-12 text-center transition-all duration-300 bg-slate-800/50 hover:border-blue-500 hover:bg-slate-800/80">
                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path>
                    </svg>
                    <h2 class="text-2xl font-semibold mb-2">Drag & Drop Your Image</h2>
                    <p class="text-gray-400 mb-4">or</p>
                    <button id="filePickerBtn" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors duration-300">
                        Browse Files
                    </button>
                    <p class="text-gray-500 text-sm mt-4">Supports PNG, JPG, and JPEG</p>
                    <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg" />
                    <!-- Thumbnail preview will appear here -->
                    <div id="thumbnailContainer"></div>
                </div>
            </div>

            <!-- Palette Grid -->
            <div id="paletteContainer" class="hidden animate-slideUp" style="animation-delay: 0.2s;">
                <h2 class="text-2xl font-bold mb-8">Your Color Palette</h2>
                <div id="paletteGrid" class="palette-grid"></div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="text-center text-gray-400 mt-12">
                <p class="text-lg">No palette generated yet. Upload an image to get started!</p>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script>
        // ============================================
        // Color Extraction Utility Functions
        // ============================================

        /**
         * Get dominant colors from an image using canvas pixel manipulation
         * @param {HTMLImageElement} img - The image element
         * @param {number} colorCount - Number of dominant colors to extract
         * @returns {Array} Array of RGB color objects sorted by frequency
         */
        function getDominantColors(img, colorCount = 5) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Resize canvas to image dimensions
            canvas.width = img.width;
            canvas.height = img.height;
            
            // Draw image to canvas
            ctx.drawImage(img, 0, 0);
            
            // Get image data
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // Extract colors using pixel sampling (every 4th pixel for performance)
            const colorMap = {};
            for (let i = 0; i < data.length; i += 16) { // Sample every 4th pixel
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const a = data[i + 3];
                
                // Skip transparent or near-white/black pixels
                if (a < 128 || (r > 245 && g > 245 && b > 245) || (r < 10 && g < 10 && b < 10)) {
                    continue;
                }
                
                // Quantize color to reduce noise (round to nearest 10)
                const qr = Math.round(r / 10) * 10;
                const qg = Math.round(g / 10) * 10;
                const qb = Math.round(b / 10) * 10;
                const key = `${qr},${qg},${qb}`;
                
                colorMap[key] = (colorMap[key] || 0) + 1;
            }
            
            // Sort colors by frequency
            const sortedColors = Object.entries(colorMap)
                .map(([key, count]) => {
                    const [r, g, b] = key.split(',').map(Number);
                    return { r, g, b, count };
                })
                .sort((a, b) => b.count - a.count)
                .slice(0, colorCount);
            
            return sortedColors;
        }

        /**
         * Convert RGB to Hex format
         * @param {number} r - Red value (0-255)
         * @param {number} g - Green value (0-255)
         * @param {number} b - Blue value (0-255)
         * @returns {string} Hex color string (#RRGGBB)
         */
        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(x => {
                const hex = x.toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('').toUpperCase();
        }

        /**
         * Convert RGB to HSL for better color naming
         * @param {number} r - Red value (0-255)
         * @param {number} g - Green value (0-255)
         * @param {number} b - Blue value (0-255)
         * @returns {object} Object with h, s, l properties
         */
        function rgbToHsl(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h = 0, s = 0;
            const l = (max + min) / 2;

            if (max !== min) {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return {
                h: Math.round(h * 360),
                s: Math.round(s * 100),
                l: Math.round(l * 100)
            };
        }

        /**
         * Generate a creative color name based on RGB values
         * @param {number} r - Red value (0-255)
         * @param {number} g - Green value (0-255)
         * @param {number} b - Blue value (0-255)
         * @returns {string} Creative color name
         */
        function generateColorName(r, g, b) {
            const hsl = rgbToHsl(r, g, b);
            const h = hsl.h;
            const s = hsl.s;
            const l = hsl.l;

            // Color descriptors based on hue, saturation, and lightness
            const hueNames = {
                0: 'Red', 15: 'Red-Orange', 30: 'Orange', 45: 'Gold',
                60: 'Yellow', 75: 'Lime', 90: 'Green', 120: 'Emerald',
                150: 'Teal', 180: 'Cyan', 210: 'Sky', 240: 'Blue',
                270: 'Violet', 300: 'Magenta', 330: 'Rose'
            };

            const saturations = {
                vivid: 'Vivid', rich: 'Rich', bright: 'Bright',
                soft: 'Soft', muted: 'Muted', pale: 'Pale', dusty: 'Dusty'
            };

            const tones = {
                light: 'Light', deep: 'Deep', warm: 'Warm', cool: 'Cool'
            };

            // Find closest hue name
            let closestHue = 'Neutral';
            let closestDiff = 360;
            for (const [key, name] of Object.entries(hueNames)) {
                const diff = Math.abs(h - parseInt(key));
                if (diff < closestDiff) {
                    closestDiff = diff;
                    closestHue = name;
                }
            }

            // Determine saturation descriptor
            let satDesc = 'Muted';
            if (s > 75) satDesc = 'Vivid';
            else if (s > 60) satDesc = 'Rich';
            else if (s > 45) satDesc = 'Bright';
            else if (s > 30) satDesc = 'Soft';
            else if (s > 15) satDesc = 'Dusty';

            // Determine lightness tone
            let toneDesc = '';
            if (l < 30) toneDesc = 'Deep ';
            else if (l > 75) toneDesc = 'Light ';

            return `${toneDesc}${satDesc} ${closestHue}`.trim();
        }

        /**
         * Show toast notification
         * @param {string} message - Toast message
         * @param {string} type - Toast type (success, error, info)
         */
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast animate-toastSlideIn ${type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600'}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        /**
         * Process image and generate color palette
         * @param {File} file - The image file
         */
        function processImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    // Show thumbnail
                    const thumbnailContainer = document.getElementById('thumbnailContainer');
                    thumbnailContainer.innerHTML = `<img src="${e.target.result}" alt="Preview" class="thumbnail-preview mx-auto" />`;

                    // Extract dominant colors
                    const colors = getDominantColors(img, 5);

                    // Generate palette
                    const paletteGrid = document.getElementById('paletteGrid');
                    paletteGrid.innerHTML = '';

                    colors.forEach((color, index) => {
                        const hex = rgbToHex(color.r, color.g, color.b);
                        const name = generateColorName(color.r, color.g, color.b);

                        const card = document.createElement('div');
                        card.className = 'color-card bg-slate-800 rounded-lg overflow-hidden shadow-lg';
                        card.style.animationDelay = `${index * 0.1}s`;
                        card.innerHTML = `
                            <div class="color-swatch w-full h-40" style="background-color: ${hex};" title="Click to copy"></div>
                            <div class="p-4">
                                <h3 class="font-semibold text-sm mb-2">${name}</h3>
                                <div class="bg-slate-700 rounded px-3 py-2 text-center cursor-pointer hover:bg-slate-600 transition-colors duration-200" id="hex-${index}" title="Click to copy">
                                    <code class="text-xs font-mono text-blue-300">${hex}</code>
                                </div>
                            </div>
                        `;

                        // Add copy to clipboard functionality
                        const hexElement = card.querySelector(`#hex-${index}`);
                        const swatch = card.querySelector('.color-swatch');

                        const copyHex = () => {
                            navigator.clipboard.writeText(hex).then(() => {
                                showToast(`Copied ${hex}!`);
                                hexElement.style.backgroundColor = '#059669';
                                setTimeout(() => {
                                    hexElement.style.backgroundColor = '';
                                }, 300);
                            });
                        };

                        hexElement.addEventListener('click', copyHex);
                        swatch.addEventListener('click', copyHex);

                        paletteGrid.appendChild(card);
                    });

                    // Show palette container
                    document.getElementById('paletteContainer').classList.remove('hidden');
                    document.getElementById('emptyState').classList.add('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ============================================
        // Event Listeners & DOM Setup
        // ============================================

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const filePickerBtn = document.getElementById('filePickerBtn');

        // File picker button click
        filePickerBtn.addEventListener('click', () => fileInput.click());

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                processImage(e.target.files[0]);
            }
        });

        // Drag over
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropzone.classList.add('drag-over');
        });

        // Drag leave
        dropzone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropzone.classList.remove('drag-over');
        });

        // Drop
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropzone.classList.remove('drag-over');

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                if (file.type.startsWith('image/')) {
                    processImage(file);
                } else {
                    showToast('Please drop an image file', 'error');
                }
            }
        });
    </script>
</body>
</html>
